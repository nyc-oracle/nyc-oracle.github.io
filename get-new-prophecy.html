<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle of Gotham — Consult the Oracle</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #0d1128;
      --darker: #080b1a;
      --accent-cyan: #55ffff;
      --accent-magenta: #ff55ff;
      --text-primary: #e8e8e8;
      --text-muted: #909090;
    }

    body {
      background: var(--dark);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      border-bottom: 3px solid var(--accent-cyan);
      padding-bottom: 1.5rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 3px 0 rgba(85,255,255,0.2);
    }

    header img {
      width: 60px;
      height: 60px;
      margin-bottom: 1rem;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 0 4px rgba(85,255,255,0.4));
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      color: var(--accent-magenta);
      text-shadow: 0 0 6px rgba(255,85,255,0.5);
      font-family: 'Press Start 2P', monospace;
    }

    header p {
      font-size: 0.7rem;
      text-shadow: none;
      line-height: 1.8;
      font-family: 'Press Start 2P', monospace;
    }

    nav {
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
    }

    nav a:hover {
      color: var(--accent-cyan);
      text-shadow: none;
    }

    .lookup {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lookup-heading {
      width: 100%;
      max-width: 600px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--accent-cyan);
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    .lookup input[type="date"] {
      flex: 1;
      min-width: 200px;
      background: var(--darker);
      border: 3px solid var(--accent-cyan);
      color: var(--accent-cyan);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 0.8rem;
      outline: none;
      text-align: center;
      box-shadow: inset 0 0 8px rgba(85,255,255,0.12);
      appearance: none;
      -webkit-appearance: none;
    }

    .lookup input[type="date"]:focus {
      box-shadow: inset 0 0 6px rgba(85,255,255,0.15);
    }

    .lookup button {
      background: var(--accent-magenta);
      color: var(--dark);
      border: 3px solid var(--accent-magenta);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #992299;
      transition: all 0.05s;
    }

    .lookup button:hover {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: 0 4px 0 #009999;
    }

    .lookup button:active {
      box-shadow: none;
      transform: translateY(4px);
    }

    #result {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: var(--darker);
      border: 3px solid var(--accent-cyan);
      padding: 1.5rem;
      box-shadow: 0 0 10px rgba(85,255,255,0.15);
    }

    .card-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-shadow: none;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .card-prophecy {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .card-index {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 2;
      border-top: 2px dashed var(--accent-magenta);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }

    .card-index a {
      color: var(--accent-magenta);
      text-decoration: none;
      text-shadow: none;
    }

    .card-index a:hover {
      text-shadow: none;
    }

    .error {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      text-align: center;
      padding: 1.5rem 0;
      text-shadow: none;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      font-size: 0.5rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <header>
    <img src="images/8bitball_v2.png" alt="Oracle">
    <h1>NYC ORACLE</h1>
    <p>WHAT DOES THE CITY FORETELL FOR NEXT YEAR?</p>
  </header>

  <nav><a href="index.html">&larr; HOME</a></nav>

  <p class="lookup-heading">GET YOUR PROPHECY FOR 2027:</p>

  <div class="lookup">
    <input type="date" id="dateInput" min="2027-01-01" max="2027-12-31" autocomplete="off" />
    <button onclick="lookup()">CONSULT</button>
  </div>

  <div id="result"></div>

  <footer>
    DERIVED FROM NYC OPEN DATA — SEASONAL PATTERNS AS PORTENTS
  </footer>

<script>
  let prophecies = null;

  async function loadData() {
    const res = await fetch('prophecies_all.csv');
    const text = await res.text();
    prophecies = parseCSV(text);
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = parseCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const values = parseCSVLine(line);
      const row = {};
      headers.forEach((h, i) => row[h.trim()] = (values[i] || '').trim());
      return row;
    });
  }

  // RFC 4180-compliant CSV line parser
  function parseCSVLine(line) {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(cur); cur = ''; }
        else { cur += ch; }
      }
    }
    result.push(cur);
    return result;
  }

  async function lookup() {
    const val = document.getElementById('dateInput').value.trim();
    const resultEl = document.getElementById('result');

    if (!val) { resultEl.innerHTML = ''; return; }

    // val is "YYYY-MM-DD"; extract MM-DD as the lookup key
    const parts = val.split('-');
    if (parts.length !== 3) {
      resultEl.innerHTML = '<p class="error">PLEASE ENTER A VALID DATE.</p>';
      return;
    }
    const mmdd = `${parts[1]}-${parts[2]}`;

    if (!prophecies) {
      resultEl.innerHTML = '<p class="error">LOADING...</p>';
      try { await loadData(); } catch (e) {
        resultEl.innerHTML = '<p class="error">PROPHECY DATA NOT FOUND.</p>';
        return;
      }
    }

    const matches = prophecies.filter(r => r.mmdd.trim() === mmdd);

    if (matches.length === 0) {
      resultEl.innerHTML = '<p class="error">NO PROPHECY FOUND FOR THAT DATE.</p>';
      return;
    }

    const match = matches[Math.floor(Math.random() * matches.length)];

    // Format display date: "January 1"
    const dateObj = new Date(val + 'T00:00:00');
    const dateLabel = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric' }).toUpperCase();

    resultEl.innerHTML = `
      <div class="card">
        <div class="card-label">THE ORACLE SPEAKS FOR ${escHtml(dateLabel)}</div>
        <div class="card-prophecy">${escHtml(match.prophecy)}</div>
        <div class="card-index">PROPHECY <a href="lookup.html?n=${escHtml(match.prophecy_index)}">#${escHtml(match.prophecy_index)}</a> &mdash; <a href="lookup.html?n=${escHtml(match.prophecy_index)}">SEE DATA USED FOR PROPHECY</a>${matches.length > 1 ? ` OR <a href="#" onclick="lookup(); return false;">CONSULT AGAIN FOR ANOTHER OMEN</a>` : ''}</div>
      </div>
    `;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const dateInput = document.getElementById('dateInput');

  dateInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') lookup();
  });

  // Lock year to 2027 if the user changes it
  dateInput.addEventListener('change', () => {
    const val = dateInput.value;
    if (val && !val.startsWith('2027-')) {
      const parts = val.split('-');
      dateInput.value = `2027-${parts[1]}-${parts[2]}`;
    }
  });

  // Pre-fill today's month/day in 2027
  const today = new Date();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  dateInput.value = `2027-${mm}-${dd}`;

  // Pre-load data in background
  loadData().catch(() => {});
</script>
</body>
</html>
