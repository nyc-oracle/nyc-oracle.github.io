<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle of Gotham</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #0d1128;
      --darker: #080b1a;
      --accent-cyan: #4ab8b8;
      --accent-magenta: #c09040;
      --text-primary: #e8e8e8;
      --text-muted: #909090;
    }

    body {
      background: var(--dark);
      color: var(--text-primary);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .container {
      width: 100%;
      max-width: 540px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 0 4px rgba(74,184,184,0.4));
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
      color: var(--accent-magenta);
      text-shadow: 0 0 6px rgba(192,144,64,0.5);
    }

    .subtitle {
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      line-height: 1.8;
    }

    .rule {
      border: none;
      border-top: 3px solid var(--accent-cyan);
      margin-bottom: 3rem;
      box-shadow: 0 0 4px rgba(74,184,184,0.3);
    }

    .actions {
      display: flex;
      flex-direction: row;
      gap: 1rem;
    }

    .btn {
      display: block;
      flex: 1;
      padding: 1.2rem 1rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      cursor: pointer;
      line-height: 1.8;
      transition: all 0.05s;
    }

    .btn-primary {
      background: var(--accent-magenta);
      color: var(--dark);
      border: 3px solid var(--accent-magenta);
      box-shadow: 0 4px 0 #806020;
    }

    .btn-primary:hover {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: 0 4px 0 #2a6868;
    }

    .btn-primary:active {
      box-shadow: none;
      transform: translateY(4px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent-cyan);
      border: 3px solid var(--accent-cyan);
      box-shadow: 0 4px 0 #2a6868;
    }

    .btn-secondary:hover {
      background: rgba(0,255,255,0.1);
      box-shadow: 0 4px 0 #2a6868;
    }

    .btn-secondary:active {
      box-shadow: none;
      transform: translateY(4px);
    }

    .btn-desc {
      display: block;
      font-size: 0.45rem;
      margin-top: 0.6rem;
      opacity: 0.8;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.5rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="images/8bitball_v2.png" alt="Oracle" class="logo">
    <h1>NYC ORACLE</h1>
    <p class="subtitle">THE CITY SPEAKS IN PATTERNS.<br>ARE YOU LISTENING?</p>
    <hr class="rule">
    <div class="actions">
      <a href="get-new-prophecy.html" class="btn btn-primary">
        CONSULT THE ORACLE
        <span class="btn-desc">Enter a date — receive a prophecy</span>
      </a>
      <a href="lookup.html" class="btn btn-secondary">
        LOOKUP PROPHECY #
        <span class="btn-desc">Find a prophecy by its number</span>
      </a>
    </div>
  </div>

  <footer>
    DERIVED FROM NYC OPEN DATA — SEASONAL PATTERNS AS PORTENTS
  </footer>

</body>
</html>
