<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle of Gotham</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1209;
      --paper: #f5ede0;
      --paper-dark: #e8d9c4;
      --rule: #b8996a;
      --muted: #7a6040;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'IM Fell English', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2rem;
      width: 100%;
      max-width: 540px;
    }

    header h1 {
      font-family: 'IM Fell English SC', serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    header p {
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .lookup {
      width: 100%;
      max-width: 540px;
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .lookup input {
      flex: 1;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      color: var(--ink);
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 1.1rem;
      padding: 0.65rem 1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .lookup input::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .lookup input:focus {
      border-color: var(--ink);
    }

    .lookup button {
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'IM Fell English SC', serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
    }

    .lookup button:hover {
      background: #3a2810;
    }

    #result {
      width: 100%;
      max-width: 540px;
    }

    .card {
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      padding: 2rem 2rem 1.75rem;
    }

    .card-label {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .card-prophecy {
      font-size: 1.2rem;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    .card-divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 1.5rem;
    }

    .card-notes-label {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .card-notes {
      font-style: italic;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-line;
    }

    .error {
      font-style: italic;
      color: var(--muted);
      text-align: center;
      padding: 1.5rem 0;
    }

    footer {
      margin-top: auto;
      padding-top: 3rem;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>NYC Oracle</h1>
    <p>Enter your prophecy number</p>
  </header>

  <div class="lookup">
    <input type="text" id="indexInput" placeholder="prophecy number" autocomplete="off" />
    <button onclick="lookup()">Consult</button>
  </div>

  <div id="result"></div>

  <footer>
    Derived from NYC Open Data &mdash; seasonal patterns as portents
  </footer>

<script>
  let prophecies = null;

  async function loadData() {
    const res = await fetch('prophecies_all.csv');
    const text = await res.text();
    prophecies = parseCSV(text);
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = parseCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const values = parseCSVLine(line);
      const row = {};
      headers.forEach((h, i) => row[h.trim()] = (values[i] || '').trim());
      return row;
    });
  }

  // RFC 4180-compliant CSV line parser
  function parseCSVLine(line) {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(cur); cur = ''; }
        else { cur += ch; }
      }
    }
    result.push(cur);
    return result;
  }

  async function lookup() {
    const val = document.getElementById('indexInput').value.trim();
    const resultEl = document.getElementById('result');

    if (!val) { resultEl.innerHTML = ''; return; }

    if (!prophecies) {
      resultEl.innerHTML = '<p class="error">Loading&hellip;</p>';
      try { await loadData(); } catch (e) {
        resultEl.innerHTML = '<p class="error">Could not load prophecy data.</p>';
        return;
      }
    }

    const match = prophecies.find(r => String(r.prophecy_index).trim() === val);

    if (!match) {
      resultEl.innerHTML = '<p class="error">No prophecy found for that number.</p>';
      return;
    }

    resultEl.innerHTML = `
      <div class="card">
        <div class="card-label">Prophecy ${escHtml(val)}</div>
        <div class="card-prophecy">${escHtml(match.prophecy)}</div>
        <hr class="card-divider">
        <div class="card-notes-label">Signs consulted</div>
        <div class="card-notes">${escHtml(match.data_notes)}</div>
      </div>
    `;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('indexInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') lookup();
  });

  // Pre-load data in background
  loadData().catch(() => {});
</script>
</body>
</html>
`
